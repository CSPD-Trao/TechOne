<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#09090b" />
  <title>Stocktake</title>
  <link rel="icon" type="image/svg+xml" href="public/favicon.svg" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #09090b;
      --surface:      #18181b;
      --surface-2:    #27272a;
      --border:       rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.15);
      --text:         #fafafa;
      --muted:        #a1a1aa;
      --accent:       #10b981;
      --danger:       #ef4444;
      --radius:       10px;
      --spring:       cubic-bezier(0.34, 1.4, 0.64, 1);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Geist', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 1.25rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo {
      font-weight: 600;
      font-size: 15px;
      color: var(--text);
      cursor: pointer;
      transition: opacity 0.1s;
    }
    .logo:hover { opacity: 0.7; }

    /* ── Main content ── */
    #main-content {
      flex: 1;
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      padding: 2rem 1.25rem;
      animation: content-enter 0.18s ease-out;
    }
    @keyframes content-enter {
      from { transform: translateY(8px); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }

    /* Stagger page sections */
    .stack-lg > *:nth-child(1) { animation: item-in 0.24s ease-out both 0ms; }
    .stack-lg > *:nth-child(2) { animation: item-in 0.24s ease-out both 55ms; }
    .stack-lg > *:nth-child(3) { animation: item-in 0.24s ease-out both 110ms; }
    .stack-lg > *:nth-child(4) { animation: item-in 0.24s ease-out both 165ms; }
    .stack-lg > *:nth-child(5) { animation: item-in 0.24s ease-out both 220ms; }
    .stack-lg > *:nth-child(6) { animation: item-in 0.24s ease-out both 275ms; }
    @keyframes item-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 0.875rem 1.25rem;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
    }

    /* ── Typography ── */
    h1 { font-size: 1.5rem; font-weight: 600; line-height: 1.25; }
    h2 { font-size: 1.0625rem; font-weight: 600; }
    .muted { color: var(--muted); }
    .small { font-size: 12px; }
    .mono  { font-family: 'Geist Mono', monospace; }

    /* ── Spacing ── */
    .stack-lg > * + * { margin-top: 1.75rem; }
    .stack-md > * + * { margin-top: 1rem; }
    .mt-1 { margin-top: 4px; }
    .mt-2 { margin-top: 8px; }
    .mt-3 { margin-top: 12px; }
    .mb-2 { margin-bottom: 8px; }
    .mb-3 { margin-bottom: 12px; }
    .mb-4 { margin-bottom: 1rem; }
    .ml-1 { margin-left: 6px; }

    /* ── Layout ── */
    .row { display: flex; align-items: center; }
    .row.gap-sm { gap: 8px; }
    .row.gap-md { gap: 12px; }
    .justify-between { justify-content: space-between; }
    .items-start { align-items: flex-start; }
    .flex-1 { flex: 1; }
    .w-full { width: 100%; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: opacity 0.12s, background 0.12s, border-color 0.12s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:active:not(:disabled) { transform: scale(0.94); }
    .btn:disabled { opacity: 0.38; cursor: not-allowed; pointer-events: none; }

    .btn-primary { background: var(--text); color: var(--bg); }
    .btn-primary:hover { opacity: 0.86; }

    .btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--surface); border-color: var(--border-hover); }

    .btn-ghost { background: transparent; color: var(--muted); }
    .btn-ghost:hover { color: var(--text); }

    .btn-danger { background: transparent; color: var(--danger); border: 1px solid rgba(239,68,68,0.25); }
    .btn-danger:hover { background: rgba(239,68,68,0.09); }

    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-lg { padding: 10px 18px; font-size: 14px; }
    .danger-text { color: var(--danger); }

    /* ── Inputs ── */
    input, textarea {
      display: block;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 12px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.14);
    }
    input.mono { font-family: 'Geist Mono', monospace; }
    textarea { resize: vertical; }

    /* ── Field ── */
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 12px; font-weight: 500; color: var(--muted); }
    .req { color: var(--accent); }
    .field-error { font-size: 12px; color: var(--danger); min-height: 16px; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }
    .card.p-0 { padding: 0; }

    /* ── Stats grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.625rem;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.875rem 1rem;
    }
    .stats-grid .stat-card:nth-child(1) { animation: item-in 0.26s ease-out both 80ms; }
    .stats-grid .stat-card:nth-child(2) { animation: item-in 0.26s ease-out both 140ms; }
    .stats-grid .stat-card:nth-child(3) { animation: item-in 0.26s ease-out both 200ms; }
    .stat-value {
      font-size: 1.625rem;
      font-weight: 600;
      line-height: 1.2;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .stat-value.small-val { font-size: 0.9375rem; padding-top: 5px; }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ── Tile grid ── */
    .tile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.625rem;
    }
    .tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.125rem;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.15s, background 0.15s, transform 0.14s, box-shadow 0.15s;
    }
    .tile:hover {
      border-color: var(--border-hover);
      background: var(--surface-2);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.28);
    }
    .tile:active { transform: scale(0.97); box-shadow: none; }
    .tile-disabled { opacity: 0.38; pointer-events: none; }
    .tile-icon { display: flex; opacity: 0.75; }
    .tile-title { font-size: 13px; font-weight: 600; }
    .tile-desc  { font-size: 12px; color: var(--muted); }

    /* ── Badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 9px;
    }

    /* ── Group label ── */
    .group-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      padding: 0.375rem 0;
    }

    /* ── Device rows ── */
    .device-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }
    .device-row:hover { background: rgba(255,255,255,0.02); }
    .device-row:last-child { border-bottom: none; }
    .device-info { display: flex; flex-direction: column; gap: 2px; }

    /* ── Scan feed ── */
    #scan-feed { display: flex; flex-direction: column; gap: 6px; }
    .scan-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.625rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      animation: scan-enter 0.28s var(--spring) both;
    }
    @keyframes scan-enter {
      0%   { opacity: 0; transform: translateY(-10px) scale(0.96); }
      70%  { opacity: 1; transform: translateY(2px) scale(1.01); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Device grid (scan screen) ── */
    .device-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(138px, 1fr));
      gap: 8px;
    }
    .device-tile {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      color: var(--text);
      transition: border-color 0.12s, background 0.12s, transform 0.1s;
      animation: tile-enter 0.2s ease-out both;
    }
    @keyframes tile-enter {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }
    .device-tile:hover { border-color: var(--border-hover); background: var(--surface-2); transform: translateY(-1px); }
    .device-tile:active { transform: scale(0.96); }
    .device-tile-asset { font-family: 'Geist Mono', monospace; font-size: 12px; font-weight: 500; }
    .device-tile-meta  { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .device-tile-time  { font-size: 11px; color: var(--muted); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 1rem;
      animation: overlay-in 0.18s ease-out;
    }
    @keyframes overlay-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      width: 100%;
      max-width: 380px;
      animation: modal-enter 0.28s var(--spring);
    }
    @keyframes modal-enter {
      from { opacity: 0; transform: scale(0.86) translateY(16px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ── Camera modal ── */
    .camera-modal { max-width: 480px; }
    .camera-preview-wrap {
      width: 100%;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      min-height: 240px;
      position: relative;
    }
    /* html5-qrcode injects elements */
    #qr-preview video { width: 100% !important; height: auto !important; }
    #qr-preview img   { display: none !important; }

    /* ── Snackbar ── */
    #snackbar-container {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 200;
      width: max-content;
      max-width: calc(100vw - 2rem);
    }
    .snack {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--text);
      color: var(--bg);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 6px 28px rgba(0,0,0,0.5);
      animation: snack-in 0.32s var(--spring) both;
    }
    @keyframes snack-in {
      0%   { opacity: 0; transform: translateY(20px) scale(0.88); }
      65%  { opacity: 1; transform: translateY(-3px) scale(1.02); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .snack-danger  { background: var(--danger); color: #fff; }
    .snack-success { background: var(--accent); color: #fff; }
    .snack-action {
      background: rgba(0,0,0,0.12);
      border: none;
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: inherit;
      font-family: inherit;
      transition: opacity 0.1s;
    }
    .snack-action:hover { opacity: 0.75; }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 4rem 1rem;
      gap: 10px;
      color: var(--muted);
      animation: item-in 0.3s ease-out both;
    }
    .empty-icon { display: flex; opacity: 0.4; }

    /* ── Back btn ── */
    .back-btn { margin-bottom: 4px; }
  </style>
</head>
<body>
  <header>
    <span class="logo" id="logo">Stocktake</span>
  </header>

  <main id="main-content"></main>

  <div id="snackbar-container"></div>

  <footer>All data stays in your browser. Nothing is uploaded.</footer>

  <script src="app.js"></script>
</body>
</html>
